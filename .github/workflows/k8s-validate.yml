name: Validate Kubernetes Manifests
on:
  push:
    paths:
      - 'k8s/**/*.yaml'
      - '.github/workflows/k8s-validate.yml'
  pull_request:
    paths:
      - 'k8s/**/*.yaml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo cp kubeval /usr/local/bin

      - name: Validate Kubernetes manifests (kubeval)
        run: |
          # kubeval — лучший инструмент для оффлайн-проверки схем
          kubeval --strict --ignore-missing-schemas k8s/*.yaml

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Dry-run apply (kubectl)
        run: |
          # Создаем временный конфиг в изолированном месте
          export KUBECONFIG=$HOME/.kube/offline_config
          
          # Настраиваем фиктивный кластер на порт, который гарантированно не ответит
          kubectl config set-cluster offline --server=http://127.0.0.1:1
          kubectl config set-context offline --cluster=offline
          kubectl config use-context offline

          for file in k8s/*.yaml; do
            echo "Validating $file"
            # --dry-run=client делает проверку локальной
            # --validate=false запрещает kubectl обращаться к серверу за схемами
            kubectl apply --dry-run=client --validate=false -f $file
          done

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: k8s/
          config_file: .yamllint.yml
