name: Validate Kubernetes Manifests
on:
  push:
    paths:
      - 'k8s/**/*.yaml'
      - '.github/workflows/k8s-validate.yml'
  pull_request:
    paths:
      - 'k8s/**/*.yaml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo cp kubeval /usr/local/bin

      - name: Validate Kubernetes manifests (kubeval)
        run: |
          # kubeval — лучший инструмент для оффлайн-проверки схем
          kubeval --strict --ignore-missing-schemas k8s/*.yaml

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Dry-run apply (kubectl)
        run: |
          # 1. Создаем фиктивный контекст, чтобы kubectl не искал localhost
          kubectl config set-cluster dummy-cluster --server=https://1.1.1.1 --insecure-skip-tls-verify
          kubectl config set-context dummy-context --cluster=dummy-cluster
          kubectl config use-context dummy-context

          # 2. Проходим циклом по файлам
          for file in k8s/*.yaml; do
            echo "Validating $file"
            # Используем --validate=false, чтобы kubectl не пытался скачать схемы с сервера
            kubectl apply --dry-run=client --validate=false -f $file
          done

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: k8s/
          config_file: .yamllint.yml
