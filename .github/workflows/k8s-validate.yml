name: Validate Kubernetes Manifests
on:
  push:
    paths:
      - 'k8s/**/*.yaml'
      - '.github/workflows/k8s-validate.yml'
  pull_request:
    paths:
      - 'k8s/**/*.yaml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Быстрая оффлайн-проверка схем через kubeval (как в методичке)
      - name: Install kubeval
        run: |
          wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo cp kubeval /usr/local/bin

      - name: Validate with kubeval
        run: kubeval --strict --ignore-missing-schemas k8s/*.yaml

      # 2. ПОДНИМАЕМ КЛАСТЕР (Решение твоей проблемы)
      - name: Create local cluster (Kind)
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kind

      # 3. Теперь kubectl увидит кластер, и dry-run сработает без ошибок
      - name: Dry-run apply
        run: |
          for file in k8s/*.yaml; do
            echo "Validating $file"
            # Теперь можно использовать даже --dry-run=server для максимальной точности
            kubectl apply --dry-run=server -f $file
          done

      # 4. Линтер YAML (как в методичке)
      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: k8s/
          config_file: .yamllint.yml